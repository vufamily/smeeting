<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Results - Meeting Assistant</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <span class="logo-icon">🎙️</span>
                    <h1>Meeting Assistant</h1>
                </div>
                <a href="/" class="btn btn-secondary">← Back to Dashboard</a>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Meeting Info -->
            <section class="card meeting-info">
                <div class="meeting-header">
                    <div class="meeting-details">
                        <h2 id="meetingName">Meeting Results</h2>
                        <p id="meetingDate" class="meeting-meta"></p>
                    </div>
                    <div class="export-buttons">
                        <button class="btn btn-secondary" onclick="copyToClipboard()">📋 Copy to Clipboard</button>
                        <button class="btn btn-secondary" onclick="exportMarkdown()">📄 Export MD</button>
                    </div>
                </div>
            </section>

            <!-- Tab Navigation -->
            <section class="card tabs-section">
                <!-- Audio Player -->
                <div class="results-audio-player" id="resultsAudioPlayer" style="display: none;">
                    <h4>🎧 Full Recording</h4>
                    <audio id="mainAudioPlayer" controls>
                        Your browser does not support the audio element.
                    </audio>
                </div>

                <div class="tabs">
                    <button class="tab-btn active" data-tab="transcript">Transcript</button>
                    <button class="tab-btn" data-tab="decisions">Decisions</button>
                    <button class="tab-btn" data-tab="tasks">Tasks</button>
                    <button class="tab-btn" data-tab="summary">Summary</button>
                </div>

                <!-- Transcript Tab -->
                <div class="tab-content active" id="tab-transcript">
                    <div class="transcript-container" id="transcriptContainer">
                        <div class="loading">Loading transcript...</div>
                    </div>
                </div>

                <!-- Decisions Tab -->
                <div class="tab-content" id="tab-decisions">
                    <div class="decisions-container" id="decisionsContainer">
                        <div class="loading">Loading decisions...</div>
                    </div>
                </div>

                <!-- Tasks Tab -->
                <div class="tab-content" id="tab-tasks">
                    <div class="tasks-container" id="tasksContainer">
                        <div class="loading">Loading tasks...</div>
                    </div>
                </div>

                <!-- Summary Tab -->
                <div class="tab-content" id="tab-summary">
                    <div class="summary-container" id="summaryContainer">
                        <div class="loading">Loading summary...</div>
                    </div>
                </div>
            </section>
        </main>

        <!-- Toast Notification -->
        <div class="toast" id="toast">
            <span class="toast-message" id="toastMessage"></span>
        </div>
    </div>

    <script src="/static/js/results.js"></script>
    <script>
        const meetingId = window.location.pathname.split('/').pop();
        const resultsManager = new ResultsManager(meetingId);

        // Load results on page load
        resultsManager.onResultsLoaded = function(data) {
            document.getElementById('meetingName').textContent = data.meeting_name || 'Meeting Results';
            document.getElementById('meetingDate').textContent = formatDate(data.created_at);
            document.getElementById('meetingDate').textContent += ' • ' + data.transcription.length + ' segments';
            
            // Initialize audio player if audio file available
            if (data.audio_file) {
                const audioPlayerSection = document.getElementById('resultsAudioPlayer');
                const mainAudioPlayer = document.getElementById('mainAudioPlayer');
                audioPlayerSection.style.display = 'block';
                console.log(1111, data.audio_file.split('/').pop())
                mainAudioPlayer.src = '/' + data.audio_file.split('/').pop();
                
                // Initialize global audio player for segment playback
                initGlobalAudioPlayer(data.audio_file);
            }
            
            renderTranscript(data.transcription);
            renderDecisions(data.decisions);
            renderTasks(data.tasks);
            renderSummary(data.summary);
        };

        resultsManager.loadResults();

        // Tab functionality
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                // Remove active class from all
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                
                // Add active to clicked
                btn.classList.add('active');
                document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
            });
        });

        function renderTranscript(segments) {
            const container = document.getElementById('transcriptContainer');
            
            if (!segments || segments.length === 0) {
                container.innerHTML = '<div class="empty-state">No transcript available</div>';
                return;
            }

            const hasAudio = resultsManager.getAudioFile() !== null;
            
            container.innerHTML = segments.map((seg, idx) => `
                <div class="transcript-segment" id="segment-${idx}">
                    <div class="segment-header">
                        <span class="segment-speaker">${escapeHtml(seg.speaker)}</span>
                        <span class="segment-time">${formatTime(seg.start)} - ${formatTime(seg.end)}</span>
                    </div>
                    <p class="segment-text">${escapeHtml(seg.text)}</p>
                    <button class="segment-play-btn" data-segment-id="${idx}" data-start="${seg.start}" data-end="${seg.end}" onclick="playSegment('${idx}', ${seg.start}, ${seg.end})" ${!hasAudio ? 'disabled' : ''}>▶ Play</button>
                </div>
            `).join('');
        }

        function renderDecisions(decisions) {
            const container = document.getElementById('decisionsContainer');
            
            if (!decisions || decisions.length === 0) {
                container.innerHTML = '<div class="empty-state">No decisions extracted</div>';
                return;
            }

            container.innerHTML = `
                <div class="decisions-list">
                    ${decisions.map(d => `
                        <div class="decision-card">
                            <div class="decision-icon">📋</div>
                            <div class="decision-content">
                                <p class="decision-text">${escapeHtml(d.text)}</p>
                                <div class="decision-meta">
                                    <span class="decision-speaker">${escapeHtml(d.speaker)}</span>
                                    <span class="decision-time">${formatTime(d.timestamp)}</span>
                                </div>
                            </div>
                            <button class="btn btn-icon" onclick="copyDecision('${escapeHtml(d.text)}')" title="Copy">📋</button>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderTasks(tasks) {
            const container = document.getElementById('tasksContainer');
            
            if (!tasks || tasks.length === 0) {
                container.innerHTML = '<div class="empty-state">No tasks identified</div>';
                return;
            }

            container.innerHTML = `
                <div class="tasks-list">
                    ${tasks.map(t => `
                        <div class="task-card" data-id="${t.id}">
                            <label class="task-checkbox">
                                <input type="checkbox" ${t.completed ? 'checked' : ''} onchange="toggleTask('${t.id}', this.checked)">
                                <span class="checkmark"></span>
                            </label>
                            <div class="task-content">
                                <p class="task-text ${t.completed ? 'completed' : ''}">${escapeHtml(t.text)}</p>
                                <div class="task-meta">
                                    <span class="task-assignee">👤 ${escapeHtml(t.assignee || 'Unassigned')}</span>
                                    <span class="task-due">📅 ${formatDate(t.due_date)}</span>
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderSummary(summary) {
            const container = document.getElementById('summaryContainer');
            
            if (!summary) {
                container.innerHTML = '<div class="empty-state">No summary available</div>';
                return;
            }

            // Convert markdown-like text to HTML
            const html = summary
                .replace(/^## (.+)$/gm, '<h3>$1</h3>')
                .replace(/^### (.+)$/gm, '<h4>$1</h4>')
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/^- (.+)$/gm, '<li>$1</li>')
                .replace(/\n\n/g, '</p><p>')
                .replace(/\n/g, '<br>');

            container.innerHTML = `<div class="summary-content"><p>${html}</p></div>`;
        }

        // Export functions
        function copyToClipboard() {
            const data = resultsManager.getResultsData();
            let text = `Meeting: ${data.meeting_name}\nDate: ${formatDate(data.created_at)}\n\n`;
            
            text += '=== TRANSCRIPT ===\n';
            data.transcription.forEach(seg => {
                text += `[${formatTime(seg.start)}] ${seg.speaker}: ${seg.text}\n`;
            });
            
            text += '\n=== DECISIONS ===\n';
            data.decisions.forEach(d => {
                text += `• ${d.text} (${d.speaker})\n`;
            });
            
            text += '\n=== TASKS ===\n';
            data.tasks.forEach(t => {
                text += `☐ ${t.text} - ${t.assignee} (due: ${formatDate(t.due_date)})\n`;
            });
            
            text += '\n=== SUMMARY ===\n' + data.summary;
            
            navigator.clipboard.writeText(text).then(() => {
                showToast('Copied to clipboard!', 'success');
            });
        }

        function exportMarkdown() {
            const data = resultsManager.getResultsData();
            let md = `# Meeting Notes\n\n`;
            md += `**Date:** ${formatDate(data.created_at)}\n\n`;
            
            md += '## Transcript\n\n';
            data.transcription.forEach(seg => {
                md += `**${seg.speaker}** [${formatTime(seg.start)}]: ${seg.text}\n\n`;
            });
            
            md += '## Key Decisions\n\n';
            data.decisions.forEach(d => {
                md += `- ${d.text} (${d.speaker} at ${formatTime(d.timestamp)})\n`;
            });
            
            md += '\n## Action Items\n\n';
            data.tasks.forEach(t => {
                const check = t.completed ? '[x]' : '[ ]';
                md += `${check} **${t.assignee}**: ${t.text} (due: ${formatDate(t.due_date)})\n`;
            });
            
            md += `\n## Summary\n\n${data.summary}\n`;
            
            // Download file
            const blob = new Blob([md], { type: 'text/markdown' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `meeting-notes-${Date.now()}.md`;
            a.click();
            URL.revokeObjectURL(url);
            
            showToast('Markdown exported!', 'success');
        }

        function toggleTask(taskId, completed) {
            const task = document.querySelector(`.task-card[data-id="${taskId}"] .task-text`);
            if (task) {
                task.classList.toggle('completed', completed);
            }
        }

        function copyDecision(text) {
            navigator.clipboard.writeText(text).then(() => {
                showToast('Copied!', 'success');
            });
        }

        // Utility functions
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        function formatDate(dateStr) {
            if (!dateStr) return '';
            const date = new Date(dateStr);
            return date.toLocaleDateString('en-US', { 
                month: 'short', 
                day: 'numeric', 
                year: 'numeric'
            });
        }

        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            document.getElementById('toastMessage').textContent = message;
            toast.className = `toast toast-${type} show`;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
    </script>
</body>
</html>
